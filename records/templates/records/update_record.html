<h1>Update Record</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Title</label><br>
    <input type="text" name="title" value="{{ record.title }}"><br><br>

    <label>Description</label><br>
    <textarea name="description">{{ record.description }}</textarea><br><br>

    <label>Current File:</label><br>
    <a href="{{ record.file.url }}">{{ record.file.name }}</a><br><br>

    <label>Upload New File (optional)</label><br>
    <input type="file" name="file"><br><br>

    <button type="submit">Update</button>
</form>
